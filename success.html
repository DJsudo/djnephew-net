<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Message Sent – D.J. Nephew</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    :root {
      --bg: #f8fafc;
      --text: #1e293b;
      --accent: #2563eb;
      --card: #eef2ff;
    }
    [data-theme="dark"] {
      --bg: #0f172a;
      --text: #e2e8f0;
      --accent: #3b82f6;
      --card: #1e293b;
    }

    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background 0.3s ease, color 0.3s ease;
      line-height: 1.6;
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
    }

    .theme-toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      background: var(--card);
      border: 1px solid var(--accent);
      padding: 0.4rem 0.8rem;
      border-radius: 999px;
      cursor: pointer;
      font-size: 0.9rem;
      color: var(--text);
    }

    .container {
      max-width: 700px;
      padding: 2rem;
      text-align: center;
    }

    .card {
      background: var(--card);
      padding: 2rem;
      border-left: 4px solid var(--accent);
      border-radius: 6px;
    }

    a {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.95rem;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div class="theme-toggle" onclick="toggleTheme()">Toggle Theme</div>

  <div class="container">
    <div class="card">
      <h1>Message Sent</h1>
      <p>Thanks — your message is on its way to me. I’ll get back to you soon.</p>
      <p><a href="/">← Return to home</a></p>
    </div>
  </div>

  <script>
    const savedTheme = localStorage.getItem("theme");
    if (savedTheme) document.documentElement.setAttribute("data-theme", savedTheme);

    function toggleTheme() {
      const current = document.documentElement.getAttribute("data-theme");
      const next = current === "dark" ? "light" : "dark";
      document.documentElement.setAttribute("data-theme", next);
      localStorage.setItem("theme", next);
    }
  </script>
</body>
</html>
